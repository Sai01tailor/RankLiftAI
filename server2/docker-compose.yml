version: "3.8"

services:
  app:
    build: .
    container_name: jeewallah-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/jeewallah
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jeewallah-net

  mongo:
    image: mongo:7
    container_name: jeewallah-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeewallah-net

  redis:
    image: redis:7-alpine
    container_name: jeewallah-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeewallah-net

  ml-service:
    build: ../ml-service
    container_name: jeewallah-ml
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - jeewallah-net

volumes:
  mongo_data:
  redis_data:

networks:
  jeewallah-net:
    driver: bridge
